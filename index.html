<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faby Profile</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold-main: #d4af37;
            --gold-soft: #f1e5ac;
            --bg-dark: #0a0a0a;
            --panel-bg: rgba(20, 20, 20, 0.9);
            --heart-color: #ffeb3b; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* CANVAS DE CORAÇÕES (FIXO PARA APARECER EM AMBAS AS TELAS) */
        #heart-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* Atrás do conteúdo, à frente do fundo preto */
            pointer-events: none;
        }

        /* TELA DE ENTRADA */
        #intro-screen {
            position: fixed;
            inset: 0;
            background: black; 
            z-index: 10000;
            transition: opacity 0.8s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* BOTÃO CENTRALIZADO E REDONDO */
        .enter-btn {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid var(--gold-main);
            color: var(--gold-main);
            width: 120px;
            height: 120px;
            border-radius: 50%;
            font-size: 1.5rem;
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.4s;
            z-index: 10002;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .enter-btn:hover {
            background: var(--gold-main);
            color: black;
            box-shadow: 0 0 35px var(--gold-main);
            transform: scale(1.1);
        }

        /* LOADING INICIAL */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10001;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .chic-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid transparent;
            border-top: 3px solid var(--gold-main);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* CONTEÚDO PRINCIPAL */
        .main-content { 
            position: relative;
            opacity: 0; 
            transition: opacity 1s ease; 
            visibility: hidden;
            z-index: 10; /* À frente dos corações */
            height: 100%;
            overflow-y: auto;
        }

        .main-content.visible {
            opacity: 1;
            visibility: visible;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        .glam-header { margin-bottom: 30px; }
        .glam-title { font-size: 3rem; color: var(--gold-main); text-transform: uppercase; letter-spacing: 5px; }
        .glam-subtitle { color: #666; font-size: 0.9rem; }

        .navbar ul {
            display: flex;
            justify-content: center;
            list-style: none;
            gap: 20px;
            margin-bottom: 30px;
        }

        .navbar a {
            text-decoration: none;
            color: #888;
            font-size: 0.9rem;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .navbar a.active, .navbar a:hover { color: var(--gold-main); border-bottom: 1px solid var(--gold-main); }

        .content-section { animation: fadeIn 0.5s ease forwards; }
        .hidden { display: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .avatar-border {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            border: 2px solid var(--gold-main);
            border-radius: 50%;
            padding: 5px;
        }

        .main-avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        .friends-grid-chic {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .friend-gem { text-decoration: none; color: white; font-size: 0.7rem; transition: 0.3s; }
        .friend-gem img { width: 60px; height: 60px; border-radius: 15px; border: 1px solid #333; display: block; margin: 0 auto 5px; }
        .friend-gem:hover img { border-color: var(--gold-main); transform: scale(1.05); }

        .floating-toggle {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--gold-main);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 1001;
        }

        .music-player {
            position: fixed;
            bottom: 80px;
            left: 20px;
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid var(--gold-main);
            width: 220px;
            transition: 0.4s;
            z-index: 1000;
        }

        .hidden-player { opacity: 0; pointer-events: none; transform: translateY(20px); }

        .player-controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 10px 0; }
        .play-btn { background: var(--gold-main); border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }

        .glam-carousel { position: relative; width: 100%; max-width: 300px; margin: 20px auto; }
        .carousel-track img { width: 100%; display: none; border-radius: 10px; border: 1px solid var(--gold-main); }
        .carousel-track img.active { display: block; }
        .nav-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: none; border: none; color: white; cursor: pointer; font-size: 1.5rem; }
        .prev-arrow { left: -30px; }
        .next-arrow { right: -30px; }
        
        .footer { margin-top: 50px; font-size: 0.7rem; color: #444; letter-spacing: 2px; }
        .footer a { color: var(--gold-main); text-decoration: none; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="chic-spinner"></div>
    </div>

    <canvas id="heart-canvas"></canvas>

    <div id="intro-screen">
        <button id="enter-btn" class="enter-btn">Faby</button>
    </div>

    <div id="main-content" class="main-content">
        <button id="toggle-player-btn" class="floating-toggle">
            <i class="ph-fill ph-music-note"></i>
        </button>
        
        <div id="floating-music-player" class="music-player hidden-player">
            <div class="player-content">
                <div class="music-info">
                    <p id="music-title" style="color:var(--gold-main); font-size:0.7rem; margin-bottom:5px;">Carregando...</p>
                </div>
                <audio id="audio-player" src="" loop></audio>
                <div class="player-controls">
                    <button id="prev-song" style="background:none; border:none; color:#777; cursor:pointer;"><i class="ph-fill ph-skip-back"></i></button>
                    <button id="play-pause-button" class="play-btn"><i id="play-icon" class="ph-fill ph-play"></i></button>
                    <button id="next-song" style="background:none; border:none; color:#777; cursor:pointer;"><i class="ph-fill ph-skip-forward"></i></button>
                </div>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5" style="width:100%; accent-color:var(--gold-main);">
            </div>
        </div>

        <div class="container"> 
            <header class="glam-header">
                <h1 class="glam-title">Faby</h1>
                <p class="glam-subtitle">46197719</p>
            </header>

            <nav class="navbar">
                <ul>
                    <li><a href="#" data-target="home-section" class="active">Inicio</a></li>
                    <li><a href="#" data-target="profile-section">Perfil</a></li>
                    <li><a href="#" data-target="gallery-section">Galería</a></li>
                </ul>
            </nav>

            <div id="content-area">
                <div id="home-section" class="content-section">
                    <div class="avatar-border">
                        <img src="https://xatimg.com/image/oOJGV6l4ls6p.jpg" alt="Avatar" class="main-avatar">
                    </div>
                    <div style="color:var(--gold-main); margin: 20px 0;">✦ ✦ ✦</div>
                    <section class="friends-showcase">
                        <h2 style="font-size: 1rem; text-transform: uppercase; color: #888;">Mis Amigos</h2>
                        <div class="friends-grid-chic">
                            <a href="https://xat.me/Jhon" target="_blank" class="friend-gem"><img src="https://xatimg.com/image/MjeWd1SYnYh9.png"><span>Jhon</span></a>
                            <a href="https://xat.me/iLushoooooo1" target="_blank" class="friend-gem"><img src="https://xatimg.com/image/1KdIw2uNwv1b.png"><span>Lusho</span></a>
                            <a href="https://xat.me/xLe0nelx25" target="_blank" class="friend-gem"><img src="https://xatimg.com/image/nQGg9tDYy5Jk.jpg"><span>Leonel</span></a>
                            <a href="https://xat.me/Rayko" target="_blank" class="friend-gem"><img src="https://xatimg.com/image/o6gySJoQm3bX.png"><span>Rayko</span></a>
                            <a href="https://xat.me/iSolange" target="_blank" class="friend-gem"><img src="https://xatimg.com/image/8onG6sOP55ok.jpg"><span>Solange</span></a>   
                            <a href="https://xat.me/heis" target="_blank" class="friend-gem"><img src="https://i.imgur.com/rpKmWK2.png"><span>Heis</span></a>
                            <a href="https://xat.me/Majito2395" target="_blank" class="friend-gem"><img src="https://xatimg.com/image/TO4iAUl9bmnp.png"><span>Majito</span></a>
                            <a href="https://xat.me/Gaby" target="_blank" class="friend-gem"><img src="https://xatimg.com/image/kE0XqQ4WiVSH.png"><span>Gaby</span></a>
                        </div>
                    </section>
                </div>

                <div id="profile-section" class="content-section hidden">
                    <p style="font-style: italic; color: #ccc; padding: 20px;">
                        "Tenemos tantas cosas y tantas oportunidades que ya ni siquiera sabemos que nos importa."
                    </p>
                </div>

                <div id="gallery-section" class="content-section hidden">
                    <div class="glam-carousel">
                        <div class="carousel-track">
                            <img src="https://xatimg.com/image/tKhOWquLIWnV.jpg" class="active">
                            <img src="https://xatimg.com/image/l1lKQBudgQyM.jpg">
                            <img src="https://xatimg.com/image/khkKIGuWO5Mc.jpg">
                            <img src="https://xatimg.com/image/B08y5KxSLntC.jpg">
                        </div>
                        <button class="nav-arrow prev-arrow">❮</button>
                        <button class="nav-arrow next-arrow">❯</button>
                    </div>
                </div>
            </div>

            <footer class="footer">
                <p>DESIGNED BY <a href="https://xat.me/Rayko">RAYKO</a> © 2025</p>
            </footer>
        </div>
    </div>

    <script>
        const playlist = [
            { name: "Eminem - You dont know", url: "https://www.dropbox.com/scl/fi/4y0lc0fi24e9yavn17psv/Eminem-you-dont-know.mp3.mp3?rlkey=zicb6spgqe3pv0gqnz3xc24zo&st=wy1w0icm&raw=1" },
            { name: "The Sound of Silence – Rising to the Night", url: "https://www.dropbox.com/scl/fi/2y9zhx5zjsdxg3zljc2f9/sound-of-silence.mp3.mp3?rlkey=88zg0td3loy40uxmcm9rnk1jt&st=qty8093e&raw=1" },
            { name: "Desireless - Voyage Voyage", url: "https://www.dropbox.com/scl/fi/2y9zhx5zjsdxg3zljc2f9/sound-of-silence.mp3.mp3?rlkey=88zg0td3loy40uxmcm9rnk1jt&st=0yenl8sh&raw=1" }
        ];

        let currentTrackIndex = 0;
        const audio = document.getElementById('audio-player');
        const musicTitle = document.getElementById('music-title');
        const playIcon = document.getElementById('play-icon');

        function loadTrack(index) {
            currentTrackIndex = index;
            audio.src = playlist[index].url;
            musicTitle.innerText = playlist[index].name;
        }

        loadTrack(0);

        // LÓGICA DO CANVAS (Sempre ativa)
        const canvas = document.getElementById('heart-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const hearts = [];
        class Heart {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * -canvas.height;
                this.size = Math.random() * 10 + 5;
                this.speedY = Math.random() * 2 + 1;
                this.speedX = Math.random() * 1 - 0.5;
                this.opacity = Math.random() * 0.5 + 0.5;
                this.shadowBlur = Math.random() * 15 + 5;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                if (this.y > canvas.height) { this.reset(); this.y = -this.size; }
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--heart-color').trim();
                ctx.shadowColor = ctx.fillStyle;
                ctx.shadowBlur = this.shadowBlur;
                ctx.beginPath();
                const topCurveHeight = this.size * 0.3;
                ctx.moveTo(this.x, this.y + topCurveHeight);
                ctx.bezierCurveTo(this.x, this.y, this.x - this.size / 2, this.y, this.x - this.size / 2, this.y + topCurveHeight);
                ctx.bezierCurveTo(this.x - this.size / 2, this.y + (this.size + topCurveHeight) / 2, this.x, this.y + (this.size + topCurveHeight) / 2, this.x, this.y + this.size);
                ctx.bezierCurveTo(this.x, this.y + (this.size + topCurveHeight) / 2, this.x + this.size / 2, this.y + (this.size + topCurveHeight) / 2, this.x + this.size / 2, this.y + topCurveHeight);
                ctx.bezierCurveTo(this.x + this.size / 2, this.y, this.x, this.y, this.x, this.y + topCurveHeight);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }

        for (let i = 0; i < 70; i++) hearts.push(new Heart());

        function animateHearts() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            hearts.forEach(h => { h.update(); h.draw(); });
            requestAnimationFrame(animateHearts);
        }
        animateHearts();

        // AÇÃO ENTRAR
        const enterBtn = document.getElementById('enter-btn');
        enterBtn.addEventListener('click', () => {
            document.getElementById('intro-screen').style.opacity = '0';
            document.getElementById('main-content').classList.add('visible');
            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
                audio.play(); 
                playIcon.classList.replace('ph-play', 'ph-pause');
            }, 800);
        });

        window.addEventListener('load', () => {
            setTimeout(() => { document.getElementById('loading-screen').style.opacity = '0'; }, 800);
        });

        // NAVEGAÇÃO
        const links = document.querySelectorAll('.navbar a');
        links.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                links.forEach(l => l.classList.remove('active'));
                link.classList.add('active');
                document.querySelectorAll('.content-section').forEach(s => s.classList.add('hidden'));
                document.getElementById(link.getAttribute('data-target')).classList.remove('hidden');
            });
        });

        // PLAYER
        document.getElementById('toggle-player-btn').addEventListener('click', () => document.getElementById('floating-music-player').classList.toggle('hidden-player'));
        document.getElementById('play-pause-button').addEventListener('click', () => {
            if (audio.paused) { audio.play(); playIcon.classList.replace('ph-play', 'ph-pause'); }
            else { audio.pause(); playIcon.classList.replace('ph-pause', 'ph-play'); }
        });
        document.getElementById('next-song').addEventListener('click', () => { currentTrackIndex = (currentTrackIndex + 1) % playlist.length; loadTrack(currentTrackIndex); audio.play(); playIcon.classList.replace('ph-play', 'ph-pause'); });
        document.getElementById('prev-song').addEventListener('click', () => { currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length; loadTrack(currentTrackIndex); audio.play(); playIcon.classList.replace('ph-play', 'ph-pause'); });
        document.getElementById('volume-slider').addEventListener('input', (e) => audio.volume = e.target.value);

        // CARROSSEL
        const images = document.querySelectorAll('.carousel-track img');
        let currentImg = 0;
        document.querySelector('.next-arrow').addEventListener('click', () => { images[currentImg].classList.remove('active'); currentImg = (currentImg + 1) % images.length; images[currentImg].classList.add('active'); });
        document.querySelector('.prev-arrow').addEventListener('click', () => { images[currentImg].classList.remove('active'); currentImg = (currentImg - 1 + images.length) % images.length; images[currentImg].classList.add('active'); });
    </script>
</body>
</html>
